# --- Standard Text Editor Keybindings ---

# Clipboard: Copy/Paste (Note: uses ctrl, not ctrl+shift)
map ctrl+c       copy_or_interrupt
map ctrl+v       paste_from_clipboard

# Selection
map ctrl+a       select_all

# Word Navigation
map ctrl+left    send_text all \x1b\x62
map ctrl+right   send_text all \x1b\x66

# Word Deletion (Ctrl+Backspace / Ctrl+Delete)
map ctrl+backspace send_text all \x17
map ctrl+delete    send_text all \x1b\x64

# --- Editor-like Tab Management ---
map ctrl+t       new_tab
map ctrl+w       close_tab

# Smooth scroll
wheel_scroll_min_lines 1

# -- Window Appearance ---
placement_strategy top-left

# Internal padding
window_padding_width 8